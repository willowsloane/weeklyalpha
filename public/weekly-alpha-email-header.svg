<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 100" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4AF5C"/>
      <stop offset="100%" stop-color="#A07D2E"/>
    </linearGradient>
  </defs>

  <!-- Full-width subtle top rule -->
  <line x1="0" y1="1" x2="600" y2="1" stroke="#C9A54E" stroke-width="2" stroke-opacity="0.8"/>

  <!-- Mark container -->
  <rect x="20" y="20" width="60" height="60" rx="6" fill="#0A1628"/>
  <rect x="20" y="20" width="60" height="60" rx="6" stroke="url(#gold)" stroke-width="1.2" fill="none"/>

  <!-- Alpha symbol -->
  <text x="50" y="63" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="url(#gold)" text-anchor="middle">&#945;</text>

  <!-- WEEKLY -->
  <text x="100" y="44" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="#94A3B8" letter-spacing="6">WEEKLY</text>

  <!-- ALPHA -->
  <text x="100" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#0F172A" letter-spacing="3">ALPHA</text>

  <!-- Divider -->
  <line x1="250" y1="35" x2="250" y2="72" stroke="#C9A54E" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Tagline -->
  <text x="268" y="48" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#64748B" letter-spacing="1.5">PRIVATE MARKETS</text>
  <text x="268" y="64" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#64748B" letter-spacing="1.5">INTELLIGENCE</text>

  <!-- Bottom rule -->
  <line x1="0" y1="99" x2="600" y2="99" stroke="#E2E8F0" stroke-width="1"/>
</svg>