<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <defs>
    <linearGradient id="mark-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C9A54E"/>
      <stop offset="100%" stop-color="#A07D2E"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C9A54E" stop-opacity="0"/>
      <stop offset="15%" stop-color="#C9A54E"/>
      <stop offset="85%" stop-color="#C9A54E"/>
      <stop offset="100%" stop-color="#C9A54E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: stylized alpha in shield-like container -->
  <rect x="4" y="12" width="56" height="56" rx="6" fill="#0A1628"/>
  <rect x="4" y="12" width="56" height="56" rx="6" stroke="url(#mark-grad)" stroke-width="1.5" fill="none"/>

  <!-- Alpha symbol -->
  <text x="32" y="53" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" fill="url(#mark-grad)" text-anchor="middle" letter-spacing="-1">&#945;</text>

  <!-- WEEKLY wordmark -->
  <text x="76" y="38" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="15" font-weight="500" fill="#64748B" letter-spacing="5.5">WEEKLY</text>

  <!-- ALPHA wordmark -->
  <text x="76" y="60" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#0F172A" letter-spacing="2">ALPHA</text>

  <!-- Subtle accent line -->
  <line x1="76" y1="66" x2="195" y2="66" stroke="url(#mark-grad)" stroke-width="1.2"/>

  <!-- Tagline -->
  <text x="76" y="76" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="8.5" font-weight="400" fill="#94A3B8" letter-spacing="2.5">PRIVATE MARKETS INTELLIGENCE</text>
</svg>