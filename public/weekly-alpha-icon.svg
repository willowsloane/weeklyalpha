<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="gold" x1="12" y1="12" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4AF5C"/>
      <stop offset="50%" stop-color="#C9A54E"/>
      <stop offset="100%" stop-color="#A07D2E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg-grad)"/>
  <rect x="1" y="1" width="62" height="62" rx="13" stroke="url(#gold)" stroke-width="1.5" fill="none"/>

  <!-- Inner subtle frame -->
  <rect x="6" y="6" width="52" height="52" rx="8" stroke="#C9A54E" stroke-width="0.5" stroke-opacity="0.2" fill="none"/>

  <!-- Alpha symbol -->
  <text x="32" y="45" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="url(#gold)" text-anchor="middle" letter-spacing="-1">&#945;</text>

  <!-- Top accent bar -->
  <line x1="18" y1="10" x2="46" y2="10" stroke="url(#gold)" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Bottom accent bar -->
  <line x1="18" y1="54" x2="46" y2="54" stroke="url(#gold)" stroke-width="1" stroke-opacity="0.4"/>
</svg>