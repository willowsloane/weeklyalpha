<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="120" y2="120">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="gold" x1="20" y1="20" x2="100" y2="100">
      <stop offset="0%" stop-color="#D4AF5C"/>
      <stop offset="50%" stop-color="#C9A54E"/>
      <stop offset="100%" stop-color="#A07D2E"/>
    </linearGradient>
    <linearGradient id="inner-glow" x1="60" y1="30" x2="60" y2="90">
      <stop offset="0%" stop-color="#D4AF5C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#A07D2E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Outer shape -->
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>
  <rect x="2" y="2" width="116" height="116" rx="24" stroke="url(#gold)" stroke-width="2" fill="none"/>

  <!-- Inner glow -->
  <rect x="12" y="12" width="96" height="96" rx="16" fill="url(#inner-glow)"/>

  <!-- Decorative corners -->
  <line x1="20" y1="16" x2="40" y2="16" stroke="#C9A54E" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="16" y1="20" x2="16" y2="40" stroke="#C9A54E" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="80" y1="104" x2="100" y2="104" stroke="#C9A54E" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="104" y1="80" x2="104" y2="100" stroke="#C9A54E" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Alpha symbol -->
  <text x="60" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="url(#gold)" text-anchor="middle">&#945;</text>

  <!-- Top accent -->
  <line x1="36" y1="22" x2="84" y2="22" stroke="url(#gold)" stroke-width="1.5" stroke-opacity="0.5"/>
</svg>